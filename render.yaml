# Optional: deploy only the API via Blueprint (single web service).
# Frontend: use Render "Static Site" with root `frontend`, build → `out/` (see README or deploy docs).
# If you do not use Blueprint, ignore this file and create the Web Service manually.

services:
  - type: web
    name: resume-screener-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SUPABASE_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MONGO_TLS_DISABLE_OCSP_CHECK
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
